[build]
builder = "nixpacks"

[[services]]
name = "web"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[services]]
name = "worker"
startCommand = "python -m worker.runner"
restartPolicyType = "on_failure"
